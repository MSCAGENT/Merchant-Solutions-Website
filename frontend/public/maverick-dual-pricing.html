<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apply Now - Dual Pricing</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; }
    #maverick { width: 100%; min-height: calc(100vh - 80px); }
    .logo-header { display: flex; justify-content: center; padding: 16px 0; border-bottom: 1px solid #f3f4f6; background: #fff; }
    .logo-header img { height: 48px; object-fit: contain; }
  </style>
</head>
<body>
  <div class="logo-header">
    <img src="https://customer-assets.emergentagent.com/job_ff2671fe-c29b-4325-802b-6a52152abd9a/artifacts/kkyjoo51_MSC_300x150.png" alt="Merchant Solutions Corp" />
  </div>
  <div id="maverick"></div>
  <script>
    (function() {
      var l = function() { new MaverickClient({ target: 'maverick', url: e.src, options: {id: '1180', agentId: '132194', referral: '0', title: 'Apply Now', theme: 'light', label: 'true'} }); };
      if(typeof window.MaverickClient === 'undefined') {
        window.webroot = "https://merchantsolutionscorpdb.com";
        var e = document.createElement('script'); e.async = true;
        e.src = window.webroot + "/js/campaign/client.js?v=" + Date.now();
        document.getElementsByTagName('head')[0].appendChild(e);
        e.onload = e.onreadystatechange = function() { l(); };
      } else { l(); }
      var observer = new MutationObserver(function() {
        var btns = document.querySelectorAll('#maverick button, #maverick input[type="submit"], #maverick [class*="submit"], #maverick [class*="btn"]');
        btns.forEach(function(btn) {
          var text = (btn.textContent || btn.value || '').toLowerCase();
          if (text.includes('continue') || text.includes('submit') || text.includes('apply') || btn.type === 'submit') {
            btn.style.background = 'linear-gradient(to right, #8b5cf6, #6d28d9)';
            btn.style.border = 'none';
            btn.style.borderRadius = '8px';
            btn.style.color = '#fff';
          }
        });
      });
      observer.observe(document.getElementById('maverick'), { childList: true, subtree: true });
    }());
  </script>
</body>
</html>
